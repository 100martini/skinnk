services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skinnk
      POSTGRES_PASSWORD: skinnk2024
      POSTGRES_DB: skinnk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinnk"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./src
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skinnk:skinnk2024@db:5432/skinnk?schema=public
      PORT: 3001
      BASE_URL: http://localhost:3001
      NODE_ENV: production
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - "3001:3001"

volumes:
  pgdata:
